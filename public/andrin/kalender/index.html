<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>📅 Andrins Kalender</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --border: #334155;
    --accent: #6366f1;
    --accent2: #10b981;
    --text: #f1f5f9;
    --sub: #94a3b8;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; padding: 0 0 48px;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #4f46e5, #0ea5e9);
    padding: 20px 16px 16px; text-align: center;
  }
  .header h1 { font-size: 24px; font-weight: 900; }
  .header p  { font-size: 13px; opacity: 0.8; margin-top: 3px; }

  .back-link {
    display: block; color: rgba(255,255,255,0.7); text-decoration: none;
    font-size: 13px; padding: 12px 14px 0; max-width: 760px; margin: 0 auto;
  }

  .container { max-width: 760px; margin: 0 auto; padding: 12px; }

  /* Month nav */
  .month-nav {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .month-nav h2 { font-size: 20px; font-weight: 800; }
  .nav-btn {
    background: var(--card); border: 1px solid var(--border);
    color: var(--text); border-radius: 10px; padding: 8px 14px;
    font-size: 16px; cursor: pointer; transition: background 0.15s;
  }
  .nav-btn:hover { background: var(--border); }

  /* View toggle */
  .view-toggle {
    display: flex; gap: 6px; margin-bottom: 16px;
  }
  .vtab {
    flex: 1; padding: 8px; border-radius: 10px; border: none;
    background: var(--card); color: var(--sub);
    font-size: 13px; font-weight: 700; cursor: pointer;
    border: 1px solid var(--border); transition: all 0.15s;
  }
  .vtab.active { background: var(--accent); color: white; border-color: var(--accent); }

  /* Calendar grid */
  .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; }
  .cal-header-cell {
    text-align: center; font-size: 11px; font-weight: 700;
    color: var(--sub); padding: 6px 2px; text-transform: uppercase;
  }
  .cal-cell {
    background: var(--card); border-radius: 8px; min-height: 68px;
    padding: 4px; cursor: pointer; transition: background 0.1s;
    border: 1px solid transparent;
  }
  .cal-cell:hover { background: #273344; }
  .cal-cell.other-month { opacity: 0.3; }
  .cal-cell.today { border-color: var(--accent); }
  .cal-cell.selected { background: #1e2d45; border-color: var(--accent2); }
  .day-num {
    font-size: 12px; font-weight: 700; margin-bottom: 3px;
    width: 22px; height: 22px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .today .day-num { background: var(--accent); color: white; }
  .event-dot {
    font-size: 10px; line-height: 1.3; padding: 2px 4px;
    border-radius: 4px; margin-bottom: 2px; overflow: hidden;
    white-space: nowrap; text-overflow: ellipsis;
    font-weight: 600; cursor: pointer;
  }

  /* Event colors */
  .cat-schule   { background: #1d4ed8; }
  .cat-sport    { background: #15803d; }
  .cat-freizeit { background: #b45309; }
  .cat-familie  { background: #9333ea; }
  .cat-default  { background: #374151; }

  /* List view */
  .list-view { display: none; }
  .list-view.active { display: block; }
  .grid-view { display: block; }
  .grid-view.hidden { display: none; }

  .day-block { margin-bottom: 16px; }
  .day-label {
    font-size: 12px; font-weight: 700; color: var(--sub);
    text-transform: uppercase; letter-spacing: 0.06em;
    margin-bottom: 8px; padding-bottom: 4px;
    border-bottom: 1px solid var(--border);
  }
  .day-label.today-label { color: var(--accent); }

  .event-card {
    background: var(--card); border-radius: 12px;
    padding: 12px 14px; margin-bottom: 8px;
    border-left: 4px solid var(--accent);
    display: flex; gap: 12px; align-items: flex-start;
  }
  .event-time {
    font-size: 13px; font-weight: 700; min-width: 48px; color: var(--sub);
  }
  .event-info { flex: 1; }
  .event-title { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
  .event-detail { font-size: 12px; color: var(--sub); }

  /* Day panel */
  .day-panel {
    background: var(--card); border-radius: 14px;
    padding: 16px; margin-top: 12px;
    border: 1px solid var(--border);
    display: none;
  }
  .day-panel.active { display: block; }
  .day-panel h3 { font-size: 16px; font-weight: 800; margin-bottom: 12px; }
  .no-events { color: var(--sub); font-size: 14px; padding: 8px 0; }

  .loading { text-align: center; padding: 40px; color: var(--sub); }
</style>
</head>
<body>

<div class="header">
  <h1>📅 Andrins Kalender</h1>
  <p id="headerSub">April 2026</p>
</div>
<a href="../" class="back-link">← Zurück zur Übersicht</a>

<div class="container">
  <div class="month-nav">
    <button class="nav-btn" onclick="prevMonth()">‹</button>
    <h2 id="monthTitle"></h2>
    <button class="nav-btn" onclick="nextMonth()">›</button>
  </div>

  <div class="view-toggle">
    <button class="vtab active" onclick="switchView('month',this)">📅 Monat</button>
    <button class="vtab" onclick="switchView('list',this)">📋 Liste</button>
  </div>

  <!-- Month grid -->
  <div class="grid-view" id="gridView">
    <div class="cal-grid" id="calGrid"></div>
    <div class="day-panel" id="dayPanel">
      <h3 id="dayPanelTitle"></h3>
      <div id="dayPanelEvents"></div>
    </div>
  </div>

  <!-- List view -->
  <div class="list-view" id="listView">
    <div id="listContent"></div>
  </div>
</div>

<script>
// ── Config ──────────────────────────────────────────────────────────────
// Calendar data is fetched from the server-side JSON endpoint
// Falls back to Google Calendar public embed if API not configured
const CALENDAR_JSON_URL = '/andrin/kalender/events.json';
const GOOGLE_CAL_ID = '__CALENDAR_ID__'; // replaced by server if known

// ── State ─────────────────────────────────────────────────────────────
let currentDate = new Date();
let viewMonth = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1);
let allEvents = [];
let selectedDay = null;
let currentView = 'month';

const MONTHS_DE = ['Januar','Februar','März','April','Mai','Juni',
                   'Juli','August','September','Oktober','November','Dezember'];
const DAYS_DE   = ['Mo','Di','Mi','Do','Fr','Sa','So'];

// ── Event category detection ──────────────────────────────────────────
function getCategory(title='', cal='') {
  const t = title.toLowerCase();
  if (/schule|aufgabe|test|prüfung|hausaufgabe|unterricht/.test(t)) return 'schule';
  if (/training|sport|turnen|fussball|basketball|schwimmen|hockey/.test(t)) return 'sport';
  if (/geburtstag|ferien|ausflug|kino|freund|party|urlaub/.test(t)) return 'freizeit';
  if (/familie|mama|papa|oma|opa|arzt|zahnarzt/.test(t)) return 'familie';
  return 'default';
}

// ── Date helpers ──────────────────────────────────────────────────────
function isSameDay(a, b) {
  return a.getFullYear()===b.getFullYear() &&
         a.getMonth()===b.getMonth() &&
         a.getDate()===b.getDate();
}
function isToday(d) { return isSameDay(d, currentDate); }

function formatTime(dtStr) {
  if (!dtStr || dtStr.length===10) return 'Ganztags';
  const d = new Date(dtStr);
  return d.toLocaleTimeString('de-CH',{hour:'2-digit',minute:'2-digit',timeZone:'Europe/Zurich'});
}

function getEventsForDay(date) {
  return allEvents.filter(ev => {
    const start = new Date(ev.start.dateTime || ev.start.date);
    const end   = new Date(ev.end.dateTime   || ev.end.date);
    const d = new Date(date); d.setHours(12);
    return d >= start && d < end;
  });
}

// ── Render month grid ─────────────────────────────────────────────────
function renderGrid() {
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  // Day headers Mo-So
  DAYS_DE.forEach(d => {
    const h = document.createElement('div');
    h.className = 'cal-header-cell';
    h.textContent = d;
    grid.appendChild(h);
  });

  const year = viewMonth.getFullYear(), month = viewMonth.getMonth();
  document.getElementById('monthTitle').textContent = `${MONTHS_DE[month]} ${year}`;
  document.getElementById('headerSub').textContent = `${MONTHS_DE[month]} ${year}`;

  // First monday on or before 1st
  const first = new Date(year, month, 1);
  let startDay = first.getDay(); // 0=Sun
  startDay = startDay === 0 ? 6 : startDay - 1; // convert to Mon=0
  const gridStart = new Date(first);
  gridStart.setDate(gridStart.getDate() - startDay);

  for (let i = 0; i < 42; i++) {
    const d = new Date(gridStart);
    d.setDate(gridStart.getDate() + i);

    const cell = document.createElement('div');
    cell.className = 'cal-cell';
    if (d.getMonth() !== month) cell.classList.add('other-month');
    if (isToday(d)) cell.classList.add('today');
    if (selectedDay && isSameDay(d, new Date(selectedDay))) cell.classList.add('selected');

    const num = document.createElement('div');
    num.className = 'day-num';
    num.textContent = d.getDate();
    cell.appendChild(num);

    // Events for this day
    const dayEvs = getEventsForDay(d);
    dayEvs.slice(0,3).forEach(ev => {
      const dot = document.createElement('div');
      const cat = getCategory(ev.summary);
      dot.className = `event-dot cat-${cat}`;
      dot.textContent = ev.summary || '';
      cell.appendChild(dot);
    });
    if (dayEvs.length > 3) {
      const more = document.createElement('div');
      more.style.cssText = 'font-size:10px;color:#94a3b8;padding:1px 4px';
      more.textContent = `+${dayEvs.length-3} mehr`;
      cell.appendChild(more);
    }

    const dateCopy = new Date(d);
    cell.onclick = () => selectDay(dateCopy);
    grid.appendChild(cell);
  }
}

function selectDay(date) {
  selectedDay = date;
  renderGrid();

  const panel = document.getElementById('dayPanel');
  const title = document.getElementById('dayPanelTitle');
  const evContainer = document.getElementById('dayPanelEvents');

  title.textContent = date.toLocaleDateString('de-CH',
    {weekday:'long', day:'numeric', month:'long'});
  evContainer.innerHTML = '';

  const evs = getEventsForDay(date);
  if (!evs.length) {
    evContainer.innerHTML = '<div class="no-events">😌 Heute nichts geplant</div>';
  } else {
    evs.forEach(ev => {
      const card = document.createElement('div');
      card.className = 'event-card';
      const cat = getCategory(ev.summary);
      card.style.borderLeftColor = {
        schule:'#1d4ed8',sport:'#15803d',freizeit:'#b45309',
        familie:'#9333ea',default:'#374151'
      }[cat];
      card.innerHTML = `
        <div class="event-time">${formatTime(ev.start.dateTime || ev.start.date)}</div>
        <div class="event-info">
          <div class="event-title">${ev.summary||'Termin'}</div>
          ${ev.location ? `<div class="event-detail">📍 ${ev.location}</div>` : ''}
          ${ev.description ? `<div class="event-detail">${ev.description.substring(0,80)}</div>` : ''}
        </div>`;
      evContainer.appendChild(card);
    });
  }
  panel.classList.add('active');
  panel.scrollIntoView({behavior:'smooth', block:'nearest'});
}

// ── Render list view ──────────────────────────────────────────────────
function renderList() {
  const container = document.getElementById('listContent');
  container.innerHTML = '';

  // Next 30 days from today
  const upcoming = [];
  for (let i = 0; i < 30; i++) {
    const d = new Date(currentDate);
    d.setDate(d.getDate() + i);
    const evs = getEventsForDay(d);
    if (evs.length || i === 0) upcoming.push({date: new Date(d), evs});
  }

  upcoming.forEach(({date, evs}) => {
    if (!evs.length && !isSameDay(date, currentDate)) return;
    const block = document.createElement('div');
    block.className = 'day-block';

    const lbl = document.createElement('div');
    lbl.className = 'day-label' + (isToday(date)?' today-label':'');
    lbl.textContent = isToday(date)
      ? `Heute · ${date.toLocaleDateString('de-CH',{weekday:'long',day:'numeric',month:'long'})}`
      : date.toLocaleDateString('de-CH',{weekday:'long',day:'numeric',month:'long'});
    block.appendChild(lbl);

    if (!evs.length) {
      const ne = document.createElement('div');
      ne.className = 'no-events';
      ne.textContent = '😌 Nichts geplant';
      block.appendChild(ne);
    } else {
      evs.forEach(ev => {
        const card = document.createElement('div');
        card.className = 'event-card';
        const cat = getCategory(ev.summary);
        card.style.borderLeftColor = {
          schule:'#1d4ed8',sport:'#15803d',freizeit:'#b45309',
          familie:'#9333ea',default:'#374151'
        }[cat];
        card.innerHTML = `
          <div class="event-time">${formatTime(ev.start.dateTime || ev.start.date)}</div>
          <div class="event-info">
            <div class="event-title">${ev.summary||'Termin'}</div>
            ${ev.location ? `<div class="event-detail">📍 ${ev.location}</div>` : ''}
          </div>`;
        block.appendChild(card);
      });
    }
    container.appendChild(block);
  });
}

// ── Nav ───────────────────────────────────────────────────────────────
function prevMonth() {
  viewMonth.setMonth(viewMonth.getMonth()-1);
  selectedDay = null;
  document.getElementById('dayPanel').classList.remove('active');
  renderGrid();
}
function nextMonth() {
  viewMonth.setMonth(viewMonth.getMonth()+1);
  selectedDay = null;
  document.getElementById('dayPanel').classList.remove('active');
  renderGrid();
}
function switchView(v, btn) {
  currentView = v;
  document.querySelectorAll('.vtab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (v==='month') {
    document.getElementById('gridView').classList.remove('hidden');
    document.getElementById('listView').classList.remove('active');
  } else {
    document.getElementById('gridView').classList.add('hidden');
    document.getElementById('listView').classList.add('active');
    renderList();
  }
}

// ── Load events ───────────────────────────────────────────────────────
async function loadEvents() {
  try {
    const resp = await fetch(CALENDAR_JSON_URL + '?t=' + Date.now());
    if (!resp.ok) throw new Error('not found');
    allEvents = await resp.json();
  } catch(e) {
    // Fallback: empty calendar
    allEvents = [];
    console.warn('Calendar events not loaded:', e);
  }
  renderGrid();
  if (currentView==='list') renderList();
}

loadEvents();
// Refresh every 5 minutes
setInterval(loadEvents, 5*60*1000);
</script>
</body>
</html>
