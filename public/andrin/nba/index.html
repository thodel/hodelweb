<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🏀 NBA Resultate</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #17408b;
    --card: rgba(255,255,255,0.08);
    --accent: #c9082a;
    --gold: #f5a623;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(160deg, #17408b 0%, #1d1160 100%);
    min-height: 100vh; color: white; padding: 0 0 40px;
  }

  /* Header */
  .header {
    background: rgba(0,0,0,0.3);
    padding: 18px 16px 14px;
    text-align: center;
    border-bottom: 2px solid rgba(255,255,255,0.1);
  }
  .header h1 { font-size: 26px; font-weight: 900; letter-spacing: -0.5px; }
  .header p  { font-size: 13px; opacity: 0.7; margin-top: 3px; }

  /* Date tabs */
  .date-tabs {
    display: flex; gap: 8px; padding: 14px 12px 0;
    overflow-x: auto; scrollbar-width: none;
    max-width: 720px; margin: 0 auto;
  }
  .date-tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0; padding: 7px 16px;
    border-radius: 20px; border: 2px solid rgba(255,255,255,0.2);
    background: transparent; color: white; cursor: pointer;
    font-size: 13px; font-weight: 700; transition: all 0.15s;
  }
  .tab.active { background: white; color: #17408b; border-color: white; }

  /* Container */
  .container { max-width: 720px; margin: 0 auto; padding: 12px; }

  /* Loading */
  .loading {
    text-align: center; padding: 40px; font-size: 16px; opacity: 0.7;
  }
  .spinner {
    display: inline-block; width: 32px; height: 32px;
    border: 3px solid rgba(255,255,255,0.3);
    border-top-color: white; border-radius: 50%;
    animation: spin 0.8s linear infinite; margin-bottom: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Game card */
  .game-card {
    background: var(--card); border-radius: 16px;
    padding: 14px 16px; margin-bottom: 10px;
    border: 1px solid rgba(255,255,255,0.1);
    transition: transform 0.1s;
  }
  .game-card:hover { transform: translateY(-1px); }

  .game-meta {
    font-size: 11px; opacity: 0.6; text-transform: uppercase;
    letter-spacing: 0.05em; margin-bottom: 8px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .live-badge {
    background: var(--accent); color: white;
    border-radius: 6px; padding: 2px 7px;
    font-size: 11px; font-weight: 800; animation: pulse 1.5s infinite;
  }
  @keyframes pulse { 50% { opacity: 0.6; } }

  .game-teams {
    display: flex; align-items: center; gap: 8px;
  }
  .team {
    flex: 1; text-align: center;
  }
  .team-name {
    font-size: clamp(13px, 3.5vw, 16px); font-weight: 800; line-height: 1.1;
  }
  .team-city {
    font-size: 11px; opacity: 0.55; margin-bottom: 6px;
  }
  .team-score {
    font-size: clamp(28px, 8vw, 42px); font-weight: 900;
    line-height: 1;
  }
  .team.winner .team-score { color: var(--gold); }
  .team.winner .team-name  { color: var(--gold); }
  .team.winner::after {
    content: '🏆'; display: block; font-size: 16px; margin-top: 2px;
  }
  .vs-sep {
    font-size: 18px; font-weight: 900; opacity: 0.4;
    flex-shrink: 0; min-width: 24px; text-align: center;
  }
  .score-upcoming {
    font-size: 13px; opacity: 0.7; text-align: center; margin-top: 4px;
  }

  /* Section title */
  .section-title {
    font-size: 12px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.1em; opacity: 0.55; margin: 18px 0 8px 2px;
  }

  /* Standings mini */
  .standings-card {
    background: var(--card); border-radius: 16px; overflow: hidden;
    border: 1px solid rgba(255,255,255,0.1); margin-bottom: 10px;
  }
  .standings-header {
    background: rgba(0,0,0,0.2); padding: 10px 14px;
    font-size: 13px; font-weight: 700;
  }
  .standings-row {
    display: flex; align-items: center; padding: 8px 14px;
    border-top: 1px solid rgba(255,255,255,0.06);
    font-size: 13px;
  }
  .standings-rank { width: 24px; opacity: 0.5; font-weight: 700; }
  .standings-team { flex: 1; font-weight: 600; }
  .standings-record { opacity: 0.7; font-size: 12px; }
  .standings-row.top3 .standings-rank { color: var(--gold); }

  /* Back link */
  .back-link {
    display: inline-flex; align-items: center; gap: 6px;
    color: rgba(255,255,255,0.6); text-decoration: none;
    font-size: 13px; padding: 12px 12px 0;
    max-width: 720px; margin: 0 auto; display: block;
  }
  .back-link:hover { color: white; }

  .no-games {
    text-align: center; padding: 32px; opacity: 0.6; font-size: 16px;
  }
</style>
</head>
<body>

<a href="../" class="back-link">← Zurück zur Übersicht</a>

<div class="header">
  <h1>🏀 NBA Resultate</h1>
  <p id="lastUpdate">Wird geladen...</p>
</div>

<div class="date-tabs" id="dateTabs"></div>

<div class="container">
  <div class="loading" id="loading">
    <div class="spinner"></div><br>Lade Spiele...
  </div>
  <div id="content" style="display:none"></div>
</div>

<script>
const ESPN_BASE = 'https://site.api.espn.com/apis/site/v2/sports/basketball/nba';

// Build date range: yesterday, today, tomorrow
function buildDates() {
  const dates = [];
  const labels = ['Vorgestern','Gestern','Heute','Morgen'];
  const offsets = [-2,-1,0,1];
  for (let i = 0; i < offsets.length; i++) {
    const d = new Date();
    d.setDate(d.getDate() + offsets[i]);
    const iso = d.toISOString().slice(0,10).replace(/-/g,'');
    const label = labels[i] || d.toLocaleDateString('de-CH',{weekday:'short',day:'numeric',month:'short'});
    dates.push({ iso, label, offset: offsets[i] });
  }
  return dates;
}

const DATES = buildDates();
let activeIdx = 2; // today

function pad(n){ return String(n).padStart(2,'0'); }

function toLocal(utcStr) {
  const d = new Date(utcStr);
  return d.toLocaleTimeString('de-CH',{hour:'2-digit',minute:'2-digit',timeZone:'Europe/Zurich'});
}

function renderTabs() {
  const tabs = document.getElementById('dateTabs');
  tabs.innerHTML = '';
  DATES.forEach((d,i) => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (i===activeIdx?' active':'');
    btn.textContent = d.label;
    btn.onclick = () => { activeIdx = i; renderTabs(); loadGames(); };
    tabs.appendChild(btn);
  });
}

async function loadGames() {
  document.getElementById('loading').style.display='block';
  document.getElementById('content').style.display='none';

  const dateStr = DATES[activeIdx].iso;
  const url = `${ESPN_BASE}/scoreboard?dates=${dateStr}`;

  try {
    const resp = await fetch(url);
    const data = await resp.json();
    renderGames(data.events || [], dateStr);
    document.getElementById('lastUpdate').textContent =
      'Aktualisiert: ' + new Date().toLocaleTimeString('de-CH',{hour:'2-digit',minute:'2-digit'});
  } catch(e) {
    document.getElementById('content').innerHTML =
      '<div class="no-games">⚠️ Fehler beim Laden. Bitte neu laden.</div>';
    document.getElementById('content').style.display='block';
    document.getElementById('loading').style.display='none';
  }
}

function renderGames(events, dateStr) {
  const content = document.getElementById('content');
  content.innerHTML = '';

  if (!events.length) {
    content.innerHTML = '<div class="no-games">🏖️ Heute keine NBA-Spiele</div>';
    document.getElementById('loading').style.display='none';
    content.style.display='block';
    return;
  }

  const finished = events.filter(e => e.status?.type?.completed);
  const live     = events.filter(e => e.status?.type?.state === 'in');
  const upcoming = events.filter(e => e.status?.type?.state === 'pre');

  if (live.length) {
    content.innerHTML += `<div class="section-title">🔴 Live jetzt (${live.length})</div>`;
    live.forEach(e => content.appendChild(buildCard(e, 'live')));
  }
  if (upcoming.length) {
    content.innerHTML += `<div class="section-title">🕐 Heute noch (${upcoming.length})</div>`;
    upcoming.forEach(e => content.appendChild(buildCard(e, 'upcoming')));
  }
  if (finished.length) {
    content.innerHTML += `<div class="section-title">✅ Abgeschlossen (${finished.length})</div>`;
    finished.forEach(e => content.appendChild(buildCard(e, 'finished')));
  }

  document.getElementById('loading').style.display='none';
  content.style.display='block';
}

function buildCard(event, state) {
  const card = document.createElement('div');
  card.className = 'game-card';

  const comp  = event.competitions?.[0] || {};
  const teams = comp.competitors || [];
  const home  = teams.find(t => t.homeAway==='home') || teams[0] || {};
  const away  = teams.find(t => t.homeAway==='away') || teams[1] || {};

  const hScore = parseInt(home.score || 0);
  const aScore = parseInt(away.score || 0);
  const hWin   = state==='finished' && hScore > aScore;
  const aWin   = state==='finished' && aScore > hScore;

  const statusText = state==='live'
    ? `${event.status?.displayClock || ''} · Q${event.status?.period || ''}`
    : state==='upcoming'
    ? toLocal(event.date)
    : 'Abgeschlossen';

  card.innerHTML = `
    <div class="game-meta">
      <span>${comp.venue?.fullName || 'NBA'}</span>
      ${state==='live' ? '<span class="live-badge">● LIVE</span>' : `<span>${statusText}</span>`}
    </div>
    <div class="game-teams">
      <div class="team ${aWin?'winner':''}">
        <div class="team-city">${away.team?.location||''}</div>
        <div class="team-name">${away.team?.shortDisplayName||away.team?.name||'?'}</div>
        ${state!=='upcoming' ? `<div class="team-score">${away.score||'–'}</div>` : ''}
      </div>
      <div class="vs-sep">${state==='upcoming'?toLocal(event.date):'–'}</div>
      <div class="team ${hWin?'winner':''}">
        <div class="team-city">${home.team?.location||''}</div>
        <div class="team-name">${home.team?.shortDisplayName||home.team?.name||'?'}</div>
        ${state!=='upcoming' ? `<div class="team-score">${home.score||'–'}</div>` : ''}
      </div>
    </div>
  `;
  return card;
}

// Init
renderTabs();
loadGames();
// Auto-refresh every 60s
setInterval(() => { if (activeIdx===2) loadGames(); }, 60000);
</script>
</body>
</html>
